<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTA Admin Dashboard</title>
    <style>
        :root { --bg: #0a0a0f; --card: #13131B; --border: #222233; --fg: #EAEAEF; --muted: #5E5E78; --accent: #00D68F; --danger: #FF4D6A; --bot-color: #888899; --warning: #ff9500; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--fg); font-family: system-ui, sans-serif; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        h1 { font-size: 1.5rem; color: var(--accent); }
        .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        button { padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; }
        button:disabled { cursor: not-allowed; opacity: 0.8; }
        .btn-refresh { background: var(--border); color: var(--fg); }
        .btn-refresh:hover { background: var(--muted); }
        
        /* Wipe Button Styles */
        .btn-wipe { background: transparent; color: var(--warning); border: 1px solid var(--warning); }
        .btn-wipe:hover:not(:disabled) { background: var(--warning); color: #000; }
        .btn-wipe.active-wipe { background: var(--warning); color: #000; border-color: var(--warning); }

        /* Filter Bar */
        .filter-bar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
        .filter-btn { padding: 6px 14px; font-size: 12px; background: var(--card); border: 1px solid var(--border); color: var(--muted); border-radius: 99px; cursor: pointer; }
        .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
        .btn-danger-sm { padding: 6px 14px; font-size: 12px; background: transparent; color: var(--danger); border: 1px solid var(--danger); border-radius: 99px; margin-left: auto; }
        .btn-danger-sm:hover { background: var(--danger); color: #fff; }

        .search-wrap { position: relative; display: flex; align-items: center; }
        .search-wrap svg { position: absolute; left: 12px; color: var(--muted); pointer-events: none; }
        .search-input { padding: 10px 14px 10px 38px; background: var(--card); border: 1px solid var(--border); color: var(--fg); border-radius: 8px; font-size: 13px; outline: none; width: 260px; transition: border-color 0.2s; }
        .search-input::placeholder { color: var(--muted); }
        .search-input:focus { border-color: var(--accent); }
        .search-clear { position: absolute; right: 10px; background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px 6px; font-size: 16px; line-height: 1; display: none; }
        .search-clear.visible { display: block; }
        .search-clear:hover { color: var(--fg); }
        
        .results-count { font-size: 12px; color: var(--muted); margin-bottom: 14px; padding-left: 2px; }
        .results-count span { color: var(--accent); font-weight: 700; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; animation: cardIn 0.25s ease; transition: opacity 0.2s; }
        .card.is-bot { opacity: 0.45; border-color: transparent; }
        .card.is-bot:hover { opacity: 0.8; }
        @keyframes cardIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        
        .info { flex: 1; min-width: 200px; }
        .addr { font-family: monospace; font-size: 14px; color: var(--fg); margin-bottom: 4px; word-break: break-all; }
        .nick { font-size: 12px; color: var(--muted); }
        .status { font-size: 12px; font-weight: bold; padding: 4px 10px; border-radius: 99px; }
        .status-safe { background: rgba(0,214,143,0.1); color: var(--accent); }
        .status-blocked { background: rgba(255,77,106,0.1); color: var(--danger); }
        .status-bot { background: rgba(136,136,153,0.1); color: var(--bot-color); }
        .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-block { background: var(--danger); color: #fff; }
        .btn-block:hover { background: #ff6680; }
        .btn-unblock { background: var(--accent); color: #000; }
        .btn-unblock:hover { background: #00f5a0; }
        .btn-save { background: var(--accent); color: #000; }
        .btn-delete { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-delete:hover { background: var(--danger); color: #fff; }
        .btn-mark-bot { background: var(--border); color: var(--bot-color); }
        .btn-mark-bot:hover { background: var(--muted); color: #fff; }
        .btn-unmark-bot { background: rgba(136,136,153,0.15); color: var(--bot-color); border: 1px solid var(--bot-color); }
        
        input[type="text"] { padding: 6px 10px; background: var(--bg); border: 1px solid var(--border); color: var(--fg); border-radius: 6px; font-size: 12px; outline: none; width: 120px; }
        input[type="text"]:focus { border-color: var(--accent); }
        .empty { text-align: center; margin-top: 15vh; color: var(--muted); }
        mark { background: rgba(0,214,143,0.25); color: var(--accent); border-radius: 2px; padding: 0 1px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>HTA Control Panel</h1>
        <div class="header-actions">
            <div class="search-wrap">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" class="search-input" id="search-box" placeholder="Search ID or nickname..." oninput="handleSearch()">
                <button class="search-clear" id="search-clear" onclick="clearSearch()">&times;</button>
            </div>
            <button class="btn-wipe" id="wipe-btn" onclick="triggerGlobalWipe()">Wipe All LocalStorage</button>
            <button class="btn-refresh" onclick="loadUsers()">Refresh List</button>
        </div>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" data-filter="human" onclick="setFilter('human', this)">Humans</button>
        <button class="filter-btn" data-filter="bot" onclick="setFilter('bot', this)">Bots</button>
        <button class="btn-danger-sm" onclick="deleteAllBots()">Delete All Bots</button>
    </div>

    <div class="results-count" id="results-count"></div>

    <div id="user-list">
        <div class="empty">Loading users...</div>
    </div>

    <script>
        const HZ_URL = 'https://xlisbmtenekjmundxbcn.supabase.co';
        const HZ_KEY = 'sb_publishable_Cvs-AiKPTHrC_tfGfwlpSQ_4Hir5Cva';

        let allUsers = [];
        let currentFilter = 'all';
        let wipeInterval;

        async function loadUsers() {
            const res = await fetch(`${HZ_URL}/rest/v1/users?select=*&order=created_at.desc`, {
                headers: { 'apikey': HZ_KEY }
            });
            allUsers = await res.json();
            renderList();
            checkWipeStatus(); // Check wipe status whenever we load users
        }

        // ==========================================
        // MEMORY WIPE COMMAND SYSTEM
        // ==========================================
        async function checkWipeStatus() {
            try {
                const res = await fetch(`${HZ_URL}/rest/v1/system_settings?id=eq.1&select=wipe_on`, {
                    headers: { 'apikey': HZ_KEY }
                });
                const data = await res.json();
                const isWiping = data.length > 0 && data[0].wipe_on === true;
                
                const btn = document.getElementById('wipe-btn');
                if (isWiping) {
                    btn.innerText = "Wiping in progress...";
                    btn.classList.add('active-wipe');
                    btn.disabled = true;
                    
                    // Start polling to see when it finishes
                    if (!wipeInterval) {
                        wipeInterval = setInterval(checkWipeStatus, 5000); // Check every 5 seconds
                    }
                } else {
                    btn.innerText = "Wipe All LocalStorage";
                    btn.classList.remove('active-wipe');
                    btn.disabled = false;
                    
                    // Stop polling
                    if (wipeInterval) {
                        clearInterval(wipeInterval);
                        wipeInterval = null;
                    }
                }
            } catch (e) {
                console.error("Failed to check wipe status", e);
            }
        }

        async function triggerGlobalWipe() {
            if (!confirm("WARNING: This will force all active Horizon OS users to completely wipe their browser cache and generate a NEW Computer ID.\n\nThe button will turn orange and monitor the process until everyone has logged in and been wiped.")) return;
            
            await fetch(`${HZ_URL}/rest/v1/system_settings?id=eq.1`, {
                method: 'PATCH',
                headers: { 'apikey': HZ_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                body: JSON.stringify({ wipe_on: true })
            });
            
            checkWipeStatus();
        }

        // ==========================================
        // STANDARD ADMIN UI FUNCTIONS
        // ==========================================

        function highlight(text, query) {
            if (!query) return text;
            const esc = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return text.replace(new RegExp(`(${esc})`, 'gi'), '<mark>$1</mark>');
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderList();
        }

        function renderList() {
            const query = (document.getElementById('search-box').value || '').trim().toLowerCase();
            const clearBtn = document.getElementById('search-clear');
            clearBtn.classList.toggle('visible', query.length > 0);

            let filtered = allUsers.filter(u => {
                const matchesSearch = u.computer_id.toLowerCase().includes(query) || u.nickname.toLowerCase().includes(query);
                const isBot = u.is_bot === true;
                
                if (currentFilter === 'human' && isBot) return false;
                if (currentFilter === 'bot' && !isBot) return false;
                
                return matchesSearch;
            });

            const botCount = allUsers.filter(u => u.is_bot === true).length;
            const humanCount = allUsers.length - botCount;
            const countEl = document.getElementById('results-count');

            if (allUsers.length > 0) {
                let txt = `<span>${allUsers.length}</span> users total (${humanCount} human, ${botCount} bot)`;
                if (query || currentFilter !== 'all') {
                    txt = `Showing <span>${filtered.length}</span> of ${allUsers.length} users`;
                }
                countEl.innerHTML = txt;
            } else {
                countEl.innerHTML = '';
            }

            const list = document.getElementById('user-list');

            if (allUsers.length === 0) {
                list.innerHTML = '<div class="empty">No users have visited your site yet.</div>';
                return;
            }

            if (filtered.length === 0) {
                list.innerHTML = `<div class="empty">No users match your search or filter.</div>`;
                return;
            }

            list.innerHTML = filtered.map(u => {
                const isBot = u.is_bot === true;
                const botClass = isBot ? 'is-bot' : '';
                
                let statusClass = u.is_blocked ? 'status-blocked' : 'status-safe';
                let statusText = u.is_blocked ? 'BLOCKED' : 'SAFE';
                if (isBot) { statusClass = 'status-bot'; statusText = 'BOT'; }

                const idDisplay = highlight(u.computer_id, query);
                const nickDisplay = highlight(u.nickname, query);

                return `
                <div class="card ${botClass}">
                    <div class="info">
                        <div class="addr">${idDisplay}</div>
                        <div class="nick">Nickname: ${nickDisplay}</div>
                    </div>
                    <div class="actions">
                        <span class="status ${statusClass}">${statusText}</span>
                        <input type="text" id="nick-${u.id}" placeholder="Set Nickname" value="${u.nickname === 'Unknown' ? '' : u.nickname}">
                        <button class="btn-sm btn-save" onclick="saveNick(${u.id})">Save</button>
                        ${isBot 
                            ? `<button class="btn-sm btn-unmark-bot" onclick="toggleBot(${u.id}, false)">Unmark Bot</button>` 
                            : `<button class="btn-sm btn-mark-bot" onclick="toggleBot(${u.id}, true)">Mark Bot</button>`
                        }
                        ${u.is_blocked 
                            ? `<button class="btn-sm btn-unblock" onclick="toggleBlock(${u.id}, false)">Unblock</button>` 
                            : `<button class="btn-sm btn-block" onclick="toggleBlock(${u.id}, true)">Block</button>`
                        }
                        <button class="btn-sm btn-delete" onclick="confirmDelete(${u.id}, '${u.computer_id}')">Delete</button>
                    </div>
                </div>`;
            }).join('');
        }

        function handleSearch() { renderList(); }
        function clearSearch() {
            document.getElementById('search-box').value = '';
            renderList();
            document.getElementById('search-box').focus();
        }

        async function saveNick(id) {
            const input = document.getElementById(`nick-${id}`);
            const newNick = input.value.trim() || 'Unknown';
            await fetch(`${HZ_URL}/rest/v1/users?id=eq.${id}`, {
                method: 'PATCH',
                headers: { 'apikey': HZ_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                body: JSON.stringify({ nickname: newNick })
            });
            loadUsers();
        }

        async function toggleBlock(id, blockStatus) {
            await fetch(`${HZ_URL}/rest/v1/users?id=eq.${id}`, {
                method: 'PATCH',
                headers: { 'apikey': HZ_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                body: JSON.stringify({ is_blocked: blockStatus })
            });
            loadUsers();
        }

        async function toggleBot(id, isBot) {
            await fetch(`${HZ_URL}/rest/v1/users?id=eq.${id}`, {
                method: 'PATCH',
                headers: { 'apikey': HZ_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                body: JSON.stringify({ is_bot: isBot })
            });
            loadUsers();
        }

        async function deleteAllBots() {
            const botCount = allUsers.filter(u => u.is_bot === true).length;
            if (botCount === 0) return alert("No bots to delete.");
            if (!confirm(`Are you sure you want to permanently delete ${botCount} bot(s)?`)) return;

            await fetch(`${HZ_URL}/rest/v1/users?is_bot=eq.true`, {
                method: 'DELETE',
                headers: { 'apikey': HZ_KEY }
            });
            loadUsers();
        }

        function confirmDelete(id, computerId) {
            if (confirm(`Are you sure you want to permanently delete this user?\n\nID: ${computerId}\n\nNote: If they visit again, they will be re-added.`)) {
                deleteUser(id);
            }
        }

        async function deleteUser(id) {
            await fetch(`${HZ_URL}/rest/v1/users?id=eq.${id}`, {
                method: 'DELETE',
                headers: { 'apikey': HZ_KEY }
            });
            loadUsers();
        }

        // Initial Load
        loadUsers();
    </script>
</body>
</html>
